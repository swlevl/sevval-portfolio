<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posters | Frame by Frame</title>
    <meta name="description" content="A collection of minimalist poster designs.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <nav class="nav">
            <div class="logo">
                <a href="index.html" style="text-decoration: none; color: inherit;">Frame by Frame</a>
            </div>
            <div class="search-bar">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="posterSearch" placeholder="Search posters...">
            </div>

            <div class="nav-content" id="navContent">
                <ul class="nav-links">
                    <li><a href="index.html#about">About</a></li>
                    <li><a href="posters.html">Work</a></li>
                    <li><a href="index.html#contact">Contact</a></li>
                </ul>
            </div>

            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
    </header>

    <main style="padding-top: 100px;">
        <section class="portfolio" id="work">
            <div class="section-header">
                <h2>Selected Posters</h2>
                <p>A collection of 6 poster designs curated for this lecture.</p>
            </div>
            
            <div class="gallery">
                <a href="details.html?id=kill-bill" class="poster-card" style="text-decoration: none;">
                    <div class="poster-image-wrapper">
                        <img src="assets/KILL BILL.png" alt="Kill Bill Poster" class="poster-image" loading="lazy">
                        <div class="poster-overlay">
                            <span>Kill Bill</span>
                        </div>
                    </div>
                </a>

                <a href="details.html?id=fleabag" class="poster-card" style="text-decoration: none;">
                    <div class="poster-image-wrapper">
                        <img src="assets/FLEABAG.png" alt="Fleabag Poster" class="poster-image" style="object-position: top;" loading="lazy">
                        <div class="poster-overlay">
                            <span>Fleabag</span>
                        </div>
                    </div>
                </a>

                <a href="details.html?id=whiplash" class="poster-card" style="text-decoration: none;">
                    <div class="poster-image-wrapper">
                        <img src="assets/WHIPLASH.png" alt="Whiplash Poster" class="poster-image" loading="lazy">
                        <div class="poster-overlay">
                            <span>Whiplash</span>
                        </div>
                    </div>
                </a>

                <a href="details.html?id=aftersun" class="poster-card" style="text-decoration: none;">
                    <div class="poster-image-wrapper">
                        <img src="assets/aftersun.png" alt="Aftersun Poster" class="poster-image" loading="lazy">
                        <div class="poster-overlay">
                            <span>Aftersun</span>
                        </div>
                    </div>
                </a>

                <a href="details.html?id=little-women" class="poster-card" style="text-decoration: none;">
                    <div class="poster-image-wrapper">
                        <img src="assets/little women.png" alt="Little Women Poster" class="poster-image" style="object-position: top;" loading="lazy">
                        <div class="poster-overlay">
                            <span>Little Women</span>
                        </div>
                    </div>
                </a>

                <a href="details.html?id=pearl" class="poster-card" style="text-decoration: none;">
                    <div class="poster-image-wrapper">
                        <img src="assets/PEARL.png" alt="Pearl Poster" class="poster-image" loading="lazy">
                        <div class="poster-overlay">
                            <span>Pearl</span>
                        </div>
                    </div>
                </a>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Frame by Frame. Designed with passion.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
